<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Guru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .markdown-body p { margin-bottom: 0.8em; }
        .typing-indicator span { display: inline-block; width: 5px; height: 5px; background: #94a3b8; border-radius: 50%; animation: bounce 1.3s infinite; margin-right: 2px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
        <div class="p-5 text-xl font-bold border-b border-slate-700 flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap text-blue-400"></i> Pocket Guru
        </div>
        <div class="p-4 flex-1 overflow-y-auto" id="chatHistory"></div>
        <button onclick="openSettings()" class="p-4 hover:bg-slate-800 text-left flex items-center gap-3 border-t border-slate-700">
            <i class="fa-solid fa-gear"></i> Settings
        </button>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <div class="font-bold text-lg">Pocket Guru <span class="text-green-500 text-xs ml-2">● Online</span></div>
            <button onclick="location.reload()" class="text-gray-500"><i class="fa-solid fa-rotate"></i></button>
        </header>

        <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 pb-28">
            <div class="bg-white p-4 rounded-lg shadow-sm max-w-[80%] border-l-4 border-blue-500">
                Namaste! 🙏 Main aapka <b>Pocket Guru</b> hoon. Boliye beta, aaj kya padhna hai?
            </div>
        </div>

        <div class="absolute bottom-0 w-full p-4 bg-gray-100">
            <div class="max-w-4xl mx-auto flex gap-2 items-end bg-white p-2 rounded-xl shadow-lg border">
                <textarea id="userInput" rows="1" class="flex-1 p-2 outline-none resize-none max-h-40" placeholder="Yahan apna sawal likhein..."></textarea>
                <button id="sendBtn" class="bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <p class="text-[10px] text-center mt-2 text-gray-400">Press Enter to send, Shift+Enter for new line</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl w-80 shadow-2xl">
            <h2 class="font-bold mb-4">API Settings</h2>
            <input type="password" id="keyInput" class="w-full border p-2 rounded mb-3" placeholder="Paste OpenRouter Key">
            <input type="text" id="modelInput" class="w-full border p-2 rounded mb-4" value="google/gemini-2.0-flash-lite-preview-02-05:free">
            <div class="flex justify-end gap-2">
                <button onclick="closeSettings()" class="text-gray-500 px-3">Cancel</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white px-4 py-1 rounded">Save</button>
            </div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('pg_key') || '';
        let model = localStorage.getItem('pg_model') || 'google/gemini-2.0-flash-lite-preview-02-05:free';
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        // Enter Key Logic (Sahi wala)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('sendBtn').onclick = sendMessage;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            if (!apiKey) { alert("Pehle Settings mein API Key daalo!"); openSettings(); return; }

            // Add User Message
            appendMsg('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';

            // Show Loading
            const loader = document.createElement('div');
            loader.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            chatBox.appendChild(loader);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: "system", content: "You are Pocket Guru, a helpful teacher. Always reply in Hinglish. Use 'Beta'." }, { role: "user", content: text }]
                    })
                });

                const data = await res.json();
                loader.remove();

                if (data.choices) {
                    appendMsg('ai', data.choices[0].message.content);
                } else {
                    appendMsg('ai', "Error: API key ya model galat hai.");
                }
            } catch (err) {
                loader.remove();
                appendMsg('ai', "Internet check karo beta, reply nahi aa pa raha.");
            }
        }

        function appendMsg(role, content) {
            const div = document.createElement('div');
            div.className = `p-3 rounded-lg max-w-[85%] ${role === 'user' ? 'bg-blue-600 text-white ml-auto' : 'bg-white border shadow-sm'}`;
            div.innerHTML = role === 'ai' ? marked.parse(content) : content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function openSettings() { document.getElementById('modal').style.display = 'flex'; document.getElementById('keyInput').value = apiKey; }
        function closeSettings() { document.getElementById('modal').style.display = 'none'; }
        function saveSettings() {
            apiKey = document.getElementById('keyInput').value;
            model = document.getElementById('modelInput').value;
            localStorage.setItem('pg_key', apiKey);
            localStorage.setItem('pg_model', model);
            closeSettings();
        }
    </script>
</body>
</html>
